apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "fleet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "-1"
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  resourceNames:
  - {{ .Values.database.secretName }}
  {{- range .Values.imagePullSecrets }}
  - {{ .name }}
  {{- end }}
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "fleet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fleet.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-delete-policy": before-hook-creation
    "helm.sh/hook-weight": "-1"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "fleet.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "fleet.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
