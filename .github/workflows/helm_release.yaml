name: Release chart

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semver bump
        type: choice
        options: [bugfix, minor, major]
        default: bugfix

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Bump chart version
        id: bump
        shell: bash
        run: |
          current=$(awk '/^version:/ {print $2}' charts/fleet/Chart.yaml)
          IFS=. read -r major minor bugfix <<< "$current"
          case "${{ inputs.bump }}" in
            major) major=$((major+1)); minor=0; bugfix=0 ;;
            minor) minor=$((minor+1)); bugfix=0 ;;
            *)     bugfix=$((bugfix+1)) ;;
          esac
          version="$major.$minor.$bugfix"
          app=$(awk '/^appVersion:/ {print $2}' charts/fleet/Chart.yaml | tr -d '"')
          sed -i "s/^version:.*/version: $version/" charts/fleet/Chart.yaml
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "app=$app" >> "$GITHUB_OUTPUT"

      - name: Commit bump
        run: |
          git config user.name  github-actions
          git config user.email github-actions@users.noreply.github.com
          git commit -am "chore: release fleet ${{ steps.bump.outputs.version }}"
          git push

      - name: Login to GHCR
        run: helm registry login ghcr.io -u ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm pkg to GHCR
        shell: bash
        run: |
          helm dependency build charts/fleet
          package=$(helm package charts/fleet --app-version "${{ steps.bump.outputs.app }}" --version "${{ steps.bump.outputs.version }}")
          helm push ${package##*:} oci://ghcr.io/${{ github.repository_owner }}
